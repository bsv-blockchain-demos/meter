services:
  mongodb:
    image: mongo:8
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: mongosh --eval "db.runCommand('ping').ok" --quiet
      interval: 5s
      timeout: 5s
      retries: 10

  mysql:
    image: mysql:8
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: example
      MYSQL_DATABASE: yearbook
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: mysqladmin ping -h localhost -u root -pexample
      interval: 5s
      timeout: 5s
      retries: 10

  yearbook-back:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run compile && npx tsx watch src/server.ts"
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      KNEX_URL: mysql://root:example@mysql:3306/yearbook
      MONGO_URL: mongodb://root:example@mongodb:27017
      BSV_NETWORK: main
    volumes:
      - ./backend:/app
      - backend-node-modules:/app/node_modules
    depends_on:
      mongodb:
        condition: service_healthy
      mysql:
        condition: service_healthy

  yearbook-front:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm ci && mkdir -p src/artifacts && npx webpack serve --config webpack.dev.js --host 0.0.0.0 --no-open"
    ports:
      - "5173:5173"
    environment:
      # Point API calls at the backend container
      REACT_APP_BACKEND_URL: http://localhost:8080
    volumes:
      - ./frontend:/app
      # Share compiled artifact from backend into frontend src
      - ./backend/artifacts:/app/src/artifacts:ro
      - frontend-node-modules:/app/node_modules
    depends_on:
      - yearbook-back

volumes:
  mongo-data:
  mysql-data:
  backend-node-modules:
  frontend-node-modules:
