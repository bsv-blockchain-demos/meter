services:
  mongodb:
    image: mongo:8
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: mongosh --eval "db.runCommand('ping').ok" --quiet
      interval: 5s
      timeout: 5s
      retries: 10

  mysql:
    image: mysql:8
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: example
      MYSQL_DATABASE: meter
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: mysqladmin ping -h localhost -u root -pexample
      interval: 5s
      timeout: 5s
      retries: 10

  meter-back:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      KNEX_URL: mysql://root:example@mysql:3306/meter
      MONGO_URL: mongodb://root:example@mongodb:27017
      BSV_NETWORK: main
    depends_on:
      mongodb:
        condition: service_healthy
      mysql:
        condition: service_healthy

  meter-front:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "5173:8080"
    depends_on:
      - meter-back

volumes:
  mongo-data:
  mysql-data:
